version: '3.8'
services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - APP_VERSION=v1.0.0
      - ENVIRONMENT=development
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
