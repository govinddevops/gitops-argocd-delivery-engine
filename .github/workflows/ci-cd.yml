name: 🚀 CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOCKERHUB_USERNAME: govinddevopsdocker
  IMAGE_NAME: gitops-app

jobs:

  test:
    name: 🧪 Test & Lint
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 📦 Install Dependencies
        run: |
          cd app
          pip install -r requirements.txt
          pip install flake8

      - name: 🔍 Lint with Flake8
        run: |
          cd app
          flake8 app.py --max-line-length=120 --ignore=E501

      - name: ✅ Run Tests
        run: |
          cd app
          python -c "from app import app; print('✅ App imports successfully')"

  build:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔑 Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏷️ Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=v,format=short
            type=raw,value=latest

      - name: 🐳 Build & Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  update-manifest:
    name: 📋 Update K8s Manifest
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Update Image Tag
        run: |
          NEW_TAG="v$(echo ${{ github.sha }} | cut -c1-7)"
          sed -i "s|newTag:.*|newTag: ${NEW_TAG}|g" \
            k8s/overlays/prod/kustomization.yaml
          echo "✅ Updated image tag to ${NEW_TAG}"

      - name: 📤 Commit & Push
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add k8s/overlays/prod/kustomization.yaml
          git commit -m "🤖 update image tag to v$(echo ${{ github.sha }} | cut -c1-7)" || exit 0
          git push

  verify:
    name: ✅ Verify Deployment
    runs-on: ubuntu-latest
    needs: update-manifest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🎉 Deployment Summary
        run: |
          echo "🚀 DEPLOYMENT SUCCESSFUL!"
          echo "Branch : main"
          echo "Status : ArgoCD syncing..."
```

---
