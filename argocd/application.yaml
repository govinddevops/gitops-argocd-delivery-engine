apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitops-argocd-delivery-engine
  namespace: argocd
  labels:
    app: gitops-app
    managed-by: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/govinddevops/gitops-argocd-delivery-engine
    targetRevision: HEAD
    path: k8s/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: production
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

